apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-web
  name: nginx-web
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
    spec:
      serviceAccountName: socket
      automountServiceAccountToken: false
      containers:
      - image: nginx:1.28.0
        name: nginx
        ports:
        - containerPort: 80
        resources: 
          requests:
            memory: "64Mi"
            cpu: "128m"
          limits:
            memory: "64Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20      

