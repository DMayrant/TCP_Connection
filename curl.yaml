apiVersion: v1
kind: Pod
metadata:
  labels:
    run: curl
  name: curl
spec:
  containers:
  - image: curlimages/curl:7.83.0
    name: curl
    command: ["bin/sh", "-c"]
    args:
    - |
      while true; do curl -I http://nginx-web.default.svc.cluster.local;
      sleep 1;
      done
  dnsPolicy: ClusterFirst
  restartPolicy: Always

